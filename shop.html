<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shop | DABZ GLOBAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;300;400;500;600&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#080808;--surface:#111;--surface2:#181818;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f2f2;--muted:#666;--faint:#1e1e1e;
  --accent:#5de0e6;--accent-dim:rgba(93,224,230,0.08);--accent-glow:rgba(93,224,230,0.2);
  --fd:'Syncopate',sans-serif;--fb:'Outfit',sans-serif;--fl:'Barlow Condensed',sans-serif;
}
[data-theme="light"]{
  --bg:#f0f0f0;--surface:#fff;--surface2:#e8e8e8;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#080808;--muted:#888;--faint:#e2e2e2;
  --accent:#0077cc;--accent-dim:rgba(0,119,204,0.07);--accent-glow:rgba(0,119,204,0.2);
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:62px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.nav-l{display:flex;align-items:center;gap:1rem}
.nav-back{font-family:var(--fl);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s}
.nav-back:hover{color:var(--text)}
.nav-brand{font-family:var(--fd);font-size:.7rem;font-weight:700;letter-spacing:.15em;color:var(--text)}
.nav-r{display:flex;align-items:center;gap:1rem}
.cart-btn{position:relative;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:8px 18px;font-family:var(--fl);font-size:.82rem;letter-spacing:.1em;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:border-color .2s}
.cart-btn:hover{border-color:var(--accent)}
.cart-count{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--accent);border-radius:50%;font-size:.6rem;font-weight:700;color:#000;display:flex;align-items:center;justify-content:center;display:none}
.cart-count.show{display:flex}

/* FILTER BAR */
.filter-bar{padding:1.4rem 5vw;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;background:var(--surface)}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 16px 10px 38px;font-family:var(--fb);font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
.cats{display:flex;gap:.5rem;flex-wrap:wrap}
.cat-pill{font-family:var(--fl);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;border-radius:100px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-pill.active,.cat-pill:hover{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.cond-filter{display:flex;gap:.4rem}
.cond-pill{font-family:var(--fl);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all .2s}
.cond-pill.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* MAIN */
main{padding:2.5rem 5vw;min-height:60vh}
.results-info{font-family:var(--fl);font-size:.8rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:1.8rem}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;border:1px solid var(--border);border-radius:16px;overflow:hidden}

/* PRODUCT CARD */
.pcard{background:var(--surface);display:flex;flex-direction:column;transition:background .25s;position:relative}
.pcard:hover{background:var(--faint)}
.pcard-img{width:100%;aspect-ratio:1;object-fit:contain;background:var(--surface2);padding:1.2rem}
.pcard-img-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:var(--surface2)}
.pcard-body{padding:1.2rem;flex:1;display:flex;flex-direction:column;gap:.5rem}
.pcard-badges{display:flex;gap:.4rem;flex-wrap:wrap}
.badge{font-family:var(--fl);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:100px;font-weight:600}
.badge-new{background:rgba(93,224,230,0.12);color:var(--accent);border:1px solid rgba(93,224,230,0.25)}
.badge-used{background:rgba(255,200,80,0.1);color:#f5c842;border:1px solid rgba(245,200,66,0.25)}
.badge-out{background:rgba(255,80,80,0.1);color:#f55;border:1px solid rgba(255,80,80,0.2)}
.pcard-name{font-family:var(--fd);font-size:.78rem;font-weight:700;letter-spacing:.06em;line-height:1.3}
.pcard-desc{font-size:.82rem;font-weight:300;color:var(--muted);line-height:1.6;flex:1}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border)}
.pcard-price{font-family:var(--fd);font-size:.9rem;font-weight:700;color:var(--text)}
.pcard-stock{font-family:var(--fl);font-size:.72rem;letter-spacing:.08em;color:var(--muted)}
.pcard-stock.low{color:#f5c842}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 16px;font-family:var(--fl);font-size:.78rem;letter-spacing:.08em;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s;white-space:nowrap}
.add-btn:hover{opacity:.85;transform:scale(1.04)}
.add-btn:disabled{background:var(--faint);color:var(--muted);cursor:not-allowed;transform:none}
.added-flash{position:absolute;top:10px;right:10px;background:var(--accent);color:#000;font-family:var(--fl);font-size:.7rem;letter-spacing:.1em;padding:4px 10px;border-radius:100px;opacity:0;transition:opacity .3s;pointer-events:none}

/* EMPTY */
.empty{text-align:center;padding:6rem 2rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty h3{font-family:var(--fd);font-size:1rem;letter-spacing:.08em;margin-bottom:.5rem}
.empty p{font-size:.9rem;font-weight:300}

/* CART DRAWER */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);z-index:401;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.cart-drawer.open{transform:translateX(0)}
.drawer-head{padding:1.4rem 1.6rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-title{font-family:var(--fd);font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.drawer-close{background:none;border:1px solid var(--border2);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--text);font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.drawer-close:hover{border-color:var(--accent)}
.drawer-items{flex:1;overflow-y:auto;padding:1rem 1.6rem}
.cart-item{display:flex;gap:1rem;align-items:flex-start;padding:1rem 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-img{width:56px;height:56px;border-radius:8px;background:var(--surface2);object-fit:contain;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;overflow:hidden}
.ci-img img{width:56px;height:56px;object-fit:contain}
.ci-info{flex:1}
.ci-name{font-family:var(--fd);font-size:.72rem;letter-spacing:.06em;margin-bottom:.3rem;line-height:1.3}
.ci-price{font-size:.85rem;font-weight:500;color:var(--accent);margin-bottom:.5rem}
.ci-qty{display:flex;align-items:center;gap:.6rem}
.qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:border-color .2s}
.qty-btn:hover{border-color:var(--accent)}
.qty-num{font-family:var(--fd);font-size:.75rem;min-width:20px;text-align:center}
.ci-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:4px;transition:color .2s}
.ci-remove:hover{color:#f55}
.drawer-foot{padding:1.4rem 1.6rem;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.cart-total-label{font-family:var(--fl);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.cart-total-val{font-family:var(--fd);font-size:1.1rem;font-weight:700}
.checkout-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:15px;font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:opacity .2s}
.checkout-btn:hover{opacity:.88}
.cart-empty-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.9rem;font-weight:300}

/* ORDER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:480px;overflow:hidden;transform:translateY(20px);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{padding:1.6rem 1.8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--fd);font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.modal-body{padding:1.8rem}
.modal-body label{display:block;font-family:var(--fl);font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;margin-top:1.2rem}
.modal-body label:first-of-type{margin-top:0}
.modal-body input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:var(--fb);font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s}
.modal-body input:focus{border-color:var(--accent)}
.modal-body input::placeholder{color:var(--muted)}
.order-summary{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin:1.2rem 0}
.os-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:.85rem;padding:.3rem 0}
.os-row:last-child{border-top:1px solid var(--border);margin-top:.5rem;padding-top:.8rem;font-weight:600}
.os-name{color:var(--muted);font-weight:300;max-width:65%}
.gen-btn{width:100%;margin-top:1rem;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:opacity .2s}
.gen-btn:hover{opacity:.88}

/* ORDER CODE SCREEN */
.code-screen{padding:2rem 1.8rem;text-align:center}
.code-icon{font-size:2.5rem;margin-bottom:1rem}
.code-label{font-family:var(--fl);font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem}
.order-code-box{background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:1.2rem 2rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:center;gap:1rem}
.order-code-text{font-family:var(--fd);font-size:1.6rem;font-weight:700;letter-spacing:.1em;color:var(--accent)}
.copy-code-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-family:var(--fl);font-size:.72rem;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s}
.copy-code-btn:hover{border-color:var(--accent);color:var(--text)}
.code-instruction{font-size:.88rem;font-weight:300;color:var(--muted);line-height:1.7;margin-bottom:1.6rem}
.wa-order-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:#25d366;color:#fff;border:none;border-radius:12px;padding:15px;font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:.14em;cursor:pointer;text-decoration:none;transition:opacity .2s;margin-bottom:.8rem}
.wa-order-btn:hover{opacity:.88}
.new-order-btn{width:100%;background:none;border:1px solid var(--border2);border-radius:12px;padding:12px;font-family:var(--fd);font-size:.65rem;letter-spacing:.12em;color:var(--muted);cursor:pointer;transition:all .2s}
.new-order-btn:hover{border-color:var(--accent);color:var(--text)}

@media(max-width:600px){.filter-bar{gap:.6rem}.cats{gap:.4rem}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-l">
    <a class="nav-back" href="index.html">← Back</a>
    <span style="color:var(--border2)">|</span>
    <span class="nav-brand">Dabz Global / Shop</span>
  </div>
  <div class="nav-r">
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
  </div>
  <div class="cats" id="catPills"></div>
  <div class="cond-filter">
    <button class="cond-pill active" data-cond="all" onclick="setCond(this)">All</button>
    <button class="cond-pill" data-cond="new" onclick="setCond(this)">New</button>
    <button class="cond-pill" data-cond="used" onclick="setCond(this)">Used</button>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="results-info" id="resultsInfo"></div>
  <div class="prod-grid" id="prodGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">📦</div>
    <h3>No Products Found</h3>
    <p>Try a different category or search term.</p>
  </div>
</main>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-head">
    <span class="drawer-title">Your Cart</span>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-foot" id="drawerFoot" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cartTotalDisplay">₦0</span>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Order →</button>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Place Order</span>
      <button class="drawer-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const CATS = [
  {id:'all',label:'All'},
  {id:'smartphones',label:'Smartphones'},
  {id:'tablets',label:'Tablets'},
  {id:'laptops',label:'Laptops'},
  {id:'computers',label:'Computers'},
  {id:'accessories',label:'Accessories'},
  {id:'cables',label:'Cables'},
  {id:'smarthome',label:'Smart Home'},
  {id:'wearables',label:'Wearables'},
];

const CAT_ICONS = {smartphones:'📱',tablets:'📲',laptops:'💻',computers:'🖥️',accessories:'🎧',cables:'🔌',smarthome:'🏠',wearables:'⌚'};

let activeCat = 'all';
let activeCond = 'all';
let cart = JSON.parse(localStorage.getItem('dabz_cart') || '[]');

// Read URL param
const urlCat = new URLSearchParams(location.search).get('category');
if(urlCat) activeCat = urlCat;

function getProducts(){
  return JSON.parse(localStorage.getItem('dabz_products') || '[]');
}

function saveCart(){
  localStorage.setItem('dabz_cart', JSON.stringify(cart));
  updateCartUI();
}

// Build category pills
function buildCats(){
  const wrap = document.getElementById('catPills');
  wrap.innerHTML = CATS.map(c=>`
    <button class="cat-pill ${c.id===activeCat?'active':''}" data-cat="${c.id}" onclick="setCat(this)">
      ${c.label}
    </button>`).join('');
}

function setCat(el){
  activeCat = el.dataset.cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function setCond(el){
  activeCond = el.dataset.cond;
  document.querySelectorAll('.cond-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function formatPrice(n){
  return '₦' + Number(n).toLocaleString('en-NG');
}

function renderProducts(){
  const products = getProducts();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = products.filter(p => {
    const matchCat = activeCat === 'all' || p.category === activeCat;
    const matchCond = activeCond === 'all' || p.condition === activeCond;
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    return matchCat && matchCond && matchQ;
  });

  const grid = document.getElementById('prodGrid');
  const empty = document.getElementById('emptyState');
  const info = document.getElementById('resultsInfo');

  info.textContent = `${filtered.length} product${filtered.length!==1?'s':''} found`;

  if(filtered.length === 0){
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(p => {
    const inCart = cart.find(c=>c.id===p.id);
    const outOfStock = parseInt(p.quantity) < 1;
    const lowStock = parseInt(p.quantity) > 0 && parseInt(p.quantity) <= 3;
    return `
    <div class="pcard" id="card-${p.id}">
      ${p.image
        ? `<img class="pcard-img" src="${p.image}" alt="${p.name}">`
        : `<div class="pcard-img-placeholder">${CAT_ICONS[p.category]||'📦'}</div>`}
      <div class="pcard-body">
        <div class="pcard-badges">
          <span class="badge ${p.condition==='new'?'badge-new':'badge-used'}">${p.condition}</span>
          ${outOfStock ? `<span class="badge badge-out">Out of Stock</span>` : ''}
        </div>
        <div class="pcard-name">${p.name}</div>
        ${p.description ? `<div class="pcard-desc">${p.description}</div>` : ''}
        <div class="pcard-footer">
          <div>
            <div class="pcard-price">${formatPrice(p.price)}</div>
            <div class="pcard-stock ${lowStock?'low':''}">${outOfStock ? 'Unavailable' : lowStock ? 'Only '+p.quantity+' left' : p.quantity+' in stock'}</div>
          </div>
          <button class="add-btn" onclick="addToCart('${p.id}')" ${outOfStock?'disabled':''}>
            ${inCart ? 'In Cart ✓' : '+ Add'}
          </button>
        </div>
      </div>
      <div class="added-flash" id="flash-${p.id}">Added!</div>
    </div>`;
  }).join('');
}

function addToCart(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const existing = cart.find(c=>c.id===id);
  if(existing){
    if(existing.qty < parseInt(p.quantity)) existing.qty++;
  } else {
    cart.push({id:p.id, name:p.name, price:p.price, condition:p.condition, image:p.image, category:p.category, maxQty:parseInt(p.quantity), qty:1});
  }
  saveCart();
  renderProducts();
  // Flash
  const flash = document.getElementById(`flash-${id}`);
  if(flash){flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',1000);}
}

function updateCartUI(){
  const total = cart.reduce((s,c)=>s + c.qty,0);
  const el = document.getElementById('cartCount');
  el.textContent = total;
  el.classList.toggle('show', total > 0);
  renderCartItems();
}

function renderCartItems(){
  const wrap = document.getElementById('drawerItems');
  const foot = document.getElementById('drawerFoot');
  const totalDisplay = document.getElementById('cartTotalDisplay');
  if(cart.length === 0){
    wrap.innerHTML = '<div class="cart-empty-msg">Your cart is empty.<br>Add some products to get started.</div>';
    foot.style.display = 'none';
    return;
  }
  foot.style.display = 'block';
  const grandTotal = cart.reduce((s,c)=>s+(c.price*c.qty),0);
  totalDisplay.textContent = formatPrice(grandTotal);
  wrap.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div class="ci-img">
        ${c.image ? `<img src="${c.image}" alt="${c.name}">` : CAT_ICONS[c.category]||'📦'}
      </div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-price">${formatPrice(c.price * c.qty)}</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty('${c.id}',-1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${c.id}',1)">+</button>
          <button class="ci-remove" onclick="removeFromCart('${c.id}')">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

function changeQty(id, delta){
  const item = cart.find(c=>c.id===id);
  if(!item) return;
  item.qty = Math.max(1, Math.min(item.maxQty, item.qty + delta));
  saveCart();
  renderProducts();
}

function removeFromCart(id){
  cart = cart.filter(c=>c.id!==id);
  saveCart();
  renderProducts();
}

function openCart(){
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  renderCartItems();
}
function closeCart(){
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
}

// CHECKOUT
function openCheckout(){
  closeCart();
  document.getElementById('modalTitle').textContent = 'Place Your Order';
  const grandTotal = cart.reduce((s,c)=>s+(c.price*c.qty),0);
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-body">
      <label>Your Name</label>
      <input type="text" id="orderName" placeholder="e.g. John Doe">
      <label>Phone Number</label>
      <input type="tel" id="orderPhone" placeholder="e.g. 08012345678">
      <div class="order-summary">
        ${cart.map(c=>`
          <div class="os-row">
            <span class="os-name">${c.name} (${c.condition}) x${c.qty}</span>
            <span>${formatPrice(c.price*c.qty)}</span>
          </div>`).join('')}
        <div class="os-row">
          <span>Total</span>
          <span>${formatPrice(grandTotal)}</span>
        </div>
      </div>
      <button class="gen-btn" onclick="generateOrder()">Generate Order Code →</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function generateOrder(){
  const name = document.getElementById('orderName').value.trim();
  const phone = document.getElementById('orderPhone').value.trim();
  if(!name || !phone){ alert('Please enter your name and phone number.'); return; }

  // Generate code
  const code = 'DG-' + Math.random().toString(36).toUpperCase().slice(2,7);
  const grandTotal = cart.reduce((s,c)=>s+(c.price*c.qty),0);
  const order = {
    code, name, phone,
    items: cart.map(c=>({id:c.id,name:c.name,condition:c.condition,price:c.price,qty:c.qty})),
    total: grandTotal,
    status: 'pending',
    createdAt: new Date().toISOString()
  };
  // Save order
  const orders = JSON.parse(localStorage.getItem('dabz_orders')||'[]');
  orders.unshift(order);
  localStorage.setItem('dabz_orders', JSON.stringify(orders));

  // Build WA message
  const itemsText = cart.map(c=>`- ${c.name} (${c.condition}) x${c.qty} = ${formatPrice(c.price*c.qty)}`).join('\n');
  const msg = encodeURIComponent(
    `Hi DABZ GLOBAL! 🛒\n\nOrder Code: *${code}*\n\nItems:\n${itemsText}\n\nTotal: ${formatPrice(grandTotal)}\n\nName: ${name}\nPhone: ${phone}\n\nPlease process my order. Thank you!`
  );
  const waLink = `https://wa.me/2348144343028?text=${msg}`;

  // Show code screen
  document.getElementById('modalTitle').textContent = 'Order Created';
  document.getElementById('modalContent').innerHTML = `
    <div class="code-screen">
      <div class="code-icon">✅</div>
      <div class="code-label">Your Order Code</div>
      <div class="order-code-box">
        <span class="order-code-text" id="codeText">${code}</span>
        <button class="copy-code-btn" onclick="copyCode('${code}')">Copy</button>
      </div>
      <p class="code-instruction">
        Send this code to us on WhatsApp. Our team will confirm your order, arrange payment, and process delivery for you.
      </p>
      <a class="wa-order-btn" href="${waLink}" target="_blank">
        💬 &nbsp; Send Order on WhatsApp
      </a>
      <button class="new-order-btn" onclick="closeModal();clearCart()">Done / New Order</button>
    </div>`;

  // Clear cart after order
  cart = [];
  saveCart();
  renderProducts();
}

function copyCode(code){
  navigator.clipboard.writeText(code).then(()=>{
    const btn = document.querySelector('.copy-code-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);}
  });
}

function clearCart(){
  cart = [];
  saveCart();
}

function openModal(){ document.getElementById('modalOverlay').classList.add('open') }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open') }

// Init
buildCats();
renderProducts();
updateCartUI();
</script>
</body>
</html>
