<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin | DABZ GLOBAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;300;400;500;600&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#111;--surface2:#181818;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f2f2;--muted:#666;--faint:#1e1e1e;
  --accent:#5de0e6;--accent-dim:rgba(93,224,230,0.08);
  --red:#f55050;--red-dim:rgba(245,80,80,0.1);
  --green:#4dcc7a;--green-dim:rgba(77,204,122,0.1);
  --yellow:#f5c842;--yellow-dim:rgba(245,200,66,0.1);
  --fd:'Syncopate',sans-serif;--fb:'Outfit',sans-serif;--fl:'Barlow Condensed',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:380px;padding:2.5rem}
.login-logo{font-family:var(--fd);font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text);margin-bottom:.3rem}
.login-sub{font-family:var(--fl);font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem}
.form-label{font-family:var(--fl);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.5rem;margin-top:1.2rem}
.form-label:first-of-type{margin-top:0}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:var(--fb);font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.login-btn{width:100%;margin-top:1.6rem;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-err{color:var(--red);font-size:.82rem;margin-top:.8rem;text-align:center;display:none}

/* DASHBOARD */
#dashboard{display:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-brand{font-family:var(--fd);font-size:.7rem;font-weight:700;letter-spacing:.18em}
.nav-tag{font-family:var(--fl);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:3px 12px;border-radius:100px;border:1px solid rgba(93,224,230,0.2)}
.nav-r{display:flex;gap:.8rem;align-items:center}
.logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:7px 16px;font-family:var(--fl);font-size:.76rem;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.view-shop-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:7px 16px;font-family:var(--fl);font-size:.76rem;letter-spacing:.08em;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
.view-shop-btn:hover{opacity:.85}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 2rem}
.tab{font-family:var(--fl);font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;padding:1rem 1.4rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:2rem}
.tab-content.active{display:block}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:2rem}
.stat-card{background:var(--surface);padding:1.4rem 1.6rem}
.stat-n{font-family:var(--fd);font-size:1.8rem;font-weight:700;color:var(--accent)}
.stat-l{font-family:var(--fl);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.3rem}

/* PRODUCT FORM */
.section-title{font-family:var(--fd);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.4rem}
.add-form{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.8rem;margin-bottom:2rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group.full{grid-column:1/-1}
.form-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:var(--fb);font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--surface)}
.img-upload{width:100%;background:var(--bg);border:2px dashed var(--border2);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .3s;position:relative;overflow:hidden}
.img-upload:hover{border-color:var(--accent)}
.img-upload input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-text{font-family:var(--fl);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.img-preview{width:80px;height:80px;object-fit:contain;border-radius:8px;margin-bottom:.5rem;display:none}
.submit-btn{margin-top:1.2rem;background:var(--accent);color:#000;border:none;border-radius:12px;padding:13px 28px;font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:opacity .2s}
.submit-btn:hover{opacity:.88}
.success-toast{display:none;background:var(--green-dim);border:1px solid var(--green);border-radius:10px;padding:.8rem 1.2rem;color:var(--green);font-size:.88rem;margin-top:1rem;font-weight:400}

/* PRODUCT LIST */
.prod-list{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.prod-row{background:var(--surface);display:flex;align-items:center;gap:1.2rem;padding:1rem 1.4rem;transition:background .2s}
.prod-row:hover{background:var(--faint)}
.pr-img{width:48px;height:48px;border-radius:8px;background:var(--surface2);object-fit:contain;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden}
.pr-img img{width:48px;height:48px;object-fit:contain}
.pr-info{flex:1}
.pr-name{font-family:var(--fd);font-size:.72rem;font-weight:700;letter-spacing:.06em;margin-bottom:.2rem}
.pr-meta{font-family:var(--fl);font-size:.74rem;letter-spacing:.06em;color:var(--muted)}
.pr-price{font-family:var(--fd);font-size:.85rem;font-weight:700;color:var(--text);min-width:100px;text-align:right}
.pr-badge{font-family:var(--fl);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:100px;font-weight:600;flex-shrink:0}
.pr-badge.new{background:var(--accent-dim);color:var(--accent)}
.pr-badge.used{background:var(--yellow-dim);color:var(--yellow)}
.pr-qty{font-family:var(--fl);font-size:.76rem;letter-spacing:.08em;color:var(--muted);min-width:80px;text-align:center}
.pr-actions{display:flex;gap:.5rem}
.del-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-family:var(--fl);font-size:.72rem;letter-spacing:.06em;color:var(--muted);cursor:pointer;transition:all .2s}
.del-btn:hover{border-color:var(--red);color:var(--red)}
.edit-stock-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-family:var(--fl);font-size:.72rem;letter-spacing:.06em;color:var(--muted);cursor:pointer;transition:all .2s}
.edit-stock-btn:hover{border-color:var(--accent);color:var(--accent)}
.list-empty{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem;font-weight:300}

/* ORDERS */
.orders-toolbar{display:flex;gap:1rem;margin-bottom:1.6rem;flex-wrap:wrap;align-items:center}
.orders-search-wrap{flex:1;min-width:200px;position:relative}
.orders-search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 16px 10px 38px;font-family:var(--fb);font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s}
.orders-search-wrap input:focus{border-color:var(--accent)}
.orders-search-wrap input::placeholder{color:var(--muted)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.status-filter{display:flex;gap:.4rem}
.sf-pill{font-family:var(--fl);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:100px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .2s}
.sf-pill.active{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}

.order-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.6rem;margin-bottom:1px;transition:background .2s}
.order-card:hover{background:var(--faint)}
.oc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.oc-code{font-family:var(--fd);font-size:.9rem;font-weight:700;letter-spacing:.1em;color:var(--accent)}
.oc-date{font-family:var(--fl);font-size:.74rem;letter-spacing:.08em;color:var(--muted)}
.oc-customer{font-family:var(--fl);font-size:.8rem;letter-spacing:.06em;color:var(--muted);margin-bottom:.8rem}
.oc-customer strong{color:var(--text);font-weight:600}
.oc-items{font-size:.83rem;font-weight:300;color:var(--muted);line-height:1.7;margin-bottom:.8rem}
.oc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem}
.oc-total{font-family:var(--fd);font-size:.9rem;font-weight:700}
.oc-actions{display:flex;gap:.5rem;align-items:center}
.status-badge{font-family:var(--fl);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px;font-weight:600}
.status-badge.pending{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(245,200,66,0.25)}
.status-badge.processed{background:var(--green-dim);color:var(--green);border:1px solid rgba(77,204,122,0.25)}
.mark-btn{background:var(--green-dim);border:1px solid rgba(77,204,122,0.3);border-radius:8px;padding:6px 14px;font-family:var(--fl);font-size:.72rem;letter-spacing:.08em;color:var(--green);cursor:pointer;transition:all .2s}
.mark-btn:hover{background:var(--green);color:#000}
.unmark-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-family:var(--fl);font-size:.72rem;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s}
.unmark-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.del-order-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-family:var(--fl);font-size:.72rem;color:var(--muted);cursor:pointer;transition:all .2s}
.del-order-btn:hover{border-color:var(--red);color:var(--red)}
.orders-empty{text-align:center;padding:4rem;color:var(--muted);font-size:.9rem;font-weight:300}

/* STOCK MODAL */
.smodal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity .2s}
.smodal-overlay.open{opacity:1;pointer-events:all}
.smodal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:360px;padding:2rem}
.smodal h3{font-family:var(--fd);font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.4rem}
.smodal-btns{display:flex;gap:.8rem;margin-top:1.2rem}
.smodal-save{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;padding:12px;font-family:var(--fd);font-size:.65rem;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:opacity .2s}
.smodal-save:hover{opacity:.88}
.smodal-cancel{flex:1;background:none;border:1px solid var(--border2);border-radius:10px;padding:12px;font-family:var(--fd);font-size:.65rem;letter-spacing:.12em;color:var(--muted);cursor:pointer;transition:all .2s}
.smodal-cancel:hover{border-color:var(--accent);color:var(--text)}

@media(max-width:600px){.form-grid{grid-template-columns:1fr}.form-group.full{grid-column:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Dabz Global</div>
    <div class="login-sub">Admin Portal</div>
    <label class="form-label">Username</label>
    <input class="form-input" id="loginUser" type="text" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="form-label">Password</label>
    <input class="form-input" id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Log In →</button>
    <div class="login-err" id="loginErr">Invalid credentials. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="nav-brand">Dabz Global</span>
      <span class="nav-tag">Admin</span>
    </div>
    <div class="nav-r">
      <a class="view-shop-btn" href="shop.html" target="_blank">View Shop ↗</a>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </nav>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('products',this)">Products</div>
    <div class="tab" onclick="switchTab('orders',this)">Orders</div>
  </div>

  <!-- PRODUCTS TAB -->
  <div class="tab-content active" id="tab-products">
    <div class="stats-row" id="statsRow"></div>

    <div class="section-title">Add New Product</div>
    <div class="add-form">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Product Image</label>
          <div class="img-upload" id="imgUploadBox">
            <input type="file" accept="image/*" onchange="handleImg(event)">
            <img id="imgPreview" class="img-preview">
            <div class="img-upload-text" id="imgUploadText">📷 Click or drag to upload image</div>
          </div>
        </div>
        <div class="form-group full">
          <label class="form-label">Product Name</label>
          <input class="form-input" id="pName" type="text" placeholder="e.g. iPhone 15 Pro Max">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="pCat">
            <option value="smartphones">Smartphones</option>
            <option value="tablets">Tablets</option>
            <option value="laptops">Laptops</option>
            <option value="computers">Computers</option>
            <option value="accessories">Accessories</option>
            <option value="cables">Cables & Chargers</option>
            <option value="smarthome">Smart Home</option>
            <option value="wearables">Wearables</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Condition</label>
          <select class="form-select" id="pCond">
            <option value="new">New</option>
            <option value="used">Used</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Price (₦)</label>
          <input class="form-input" id="pPrice" type="number" placeholder="e.g. 850000">
        </div>
        <div class="form-group">
          <label class="form-label">Quantity in Stock</label>
          <input class="form-input" id="pQty" type="number" placeholder="e.g. 5" min="0">
        </div>
        <div class="form-group full">
          <label class="form-label">Description (optional)</label>
          <input class="form-input" id="pDesc" type="text" placeholder="e.g. 256GB, Natural Titanium, UK Used">
        </div>
      </div>
      <button class="submit-btn" onclick="addProduct()">Add Product →</button>
      <div class="success-toast" id="successToast">Product added successfully!</div>
    </div>

    <div class="section-title">Inventory (<span id="prodCountLabel">0</span> products)</div>
    <div id="prodList"></div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content" id="tab-orders">
    <div class="stats-row" id="orderStatsRow"></div>
    <div class="orders-toolbar">
      <div class="orders-search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="orderSearch" placeholder="Search by order code, name or phone..." oninput="renderOrders()">
      </div>
      <div class="status-filter">
        <button class="sf-pill active" data-s="all" onclick="setOrderStatus(this)">All</button>
        <button class="sf-pill" data-s="pending" onclick="setOrderStatus(this)">Pending</button>
        <button class="sf-pill" data-s="processed" onclick="setOrderStatus(this)">Processed</button>
      </div>
    </div>
    <div id="ordersList"></div>
  </div>
</div>

<!-- STOCK EDIT MODAL -->
<div class="smodal-overlay" id="smodal">
  <div class="smodal">
    <h3>Update Stock</h3>
    <label class="form-label" id="smodalLabel">Quantity</label>
    <input class="form-input" id="smodalQty" type="number" min="0">
    <div class="smodal-btns">
      <button class="smodal-cancel" onclick="closeSmodal()">Cancel</button>
      <button class="smodal-save" onclick="saveStock()">Save →</button>
    </div>
  </div>
</div>

<script>
const CAT_ICONS={smartphones:'📱',tablets:'📲',laptops:'💻',computers:'🖥️',accessories:'🎧',cables:'🔌',smarthome:'🏠',wearables:'⌚'};

let imgData = '';
let editStockId = '';
let orderStatusFilter = 'all';

// AUTH
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if(u==='admin' && p==='admin123'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    renderAll();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
function doLogout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// TABS
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  renderAll();
}

function renderAll(){
  renderStats();
  renderProdList();
  renderOrderStats();
  renderOrders();
}

// IMAGE
function handleImg(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgData = ev.target.result;
    const preview = document.getElementById('imgPreview');
    preview.src = imgData;
    preview.style.display = 'block';
    document.getElementById('imgUploadText').textContent = '✓ Image selected';
  };
  reader.readAsDataURL(file);
}

// PRODUCTS
function getProducts(){ return JSON.parse(localStorage.getItem('dabz_products')||'[]') }
function saveProducts(p){ localStorage.setItem('dabz_products', JSON.stringify(p)) }

function addProduct(){
  const name = document.getElementById('pName').value.trim();
  const cat  = document.getElementById('pCat').value;
  const cond = document.getElementById('pCond').value;
  const price= document.getElementById('pPrice').value;
  const qty  = document.getElementById('pQty').value;
  const desc = document.getElementById('pDesc').value.trim();
  if(!name || !price || !qty){ alert('Please fill in name, price and quantity.'); return; }
  const p = getProducts();
  p.unshift({
    id: 'P' + Date.now(),
    name, category:cat, condition:cond,
    price: parseFloat(price), quantity: parseInt(qty),
    description: desc, image: imgData,
    createdAt: new Date().toISOString()
  });
  saveProducts(p);
  // Reset
  ['pName','pPrice','pQty','pDesc'].forEach(id=>document.getElementById(id).value='');
  imgData='';
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgUploadText').textContent='📷 Click or drag to upload image';
  const toast = document.getElementById('successToast');
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none', 3000);
  renderAll();
}

function deleteProduct(id){
  if(!confirm('Delete this product?')) return;
  saveProducts(getProducts().filter(p=>p.id!==id));
  renderAll();
}

function openSmodal(id, currentQty){
  editStockId = id;
  document.getElementById('smodalLabel').textContent = 'New Quantity';
  document.getElementById('smodalQty').value = currentQty;
  document.getElementById('smodal').classList.add('open');
}
function closeSmodal(){ document.getElementById('smodal').classList.remove('open') }
function saveStock(){
  const qty = parseInt(document.getElementById('smodalQty').value);
  if(isNaN(qty)||qty<0){ alert('Enter a valid quantity.'); return; }
  const prods = getProducts();
  const p = prods.find(x=>x.id===editStockId);
  if(p) p.quantity = qty;
  saveProducts(prods);
  closeSmodal();
  renderAll();
}

function formatPrice(n){ return '₦'+Number(n).toLocaleString('en-NG') }

function renderStats(){
  const prods = getProducts();
  const total = prods.length;
  const newCount = prods.filter(p=>p.condition==='new').length;
  const usedCount = prods.filter(p=>p.condition==='used').length;
  const outCount = prods.filter(p=>p.quantity<1).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-n">${total}</div><div class="stat-l">Total Products</div></div>
    <div class="stat-card"><div class="stat-n">${newCount}</div><div class="stat-l">New</div></div>
    <div class="stat-card"><div class="stat-n">${usedCount}</div><div class="stat-l">Used</div></div>
    <div class="stat-card"><div class="stat-n">${outCount}</div><div class="stat-l">Out of Stock</div></div>`;
}

function renderProdList(){
  var prods = getProducts();
  document.getElementById('prodCountLabel').textContent = prods.length;
  var wrap = document.getElementById('prodList');
  if(!prods.length){
    wrap.innerHTML = '<div class="list-empty">No products yet. Add your first product above.</div>';
    return;
  }
  var rows = prods.map(function(p){
    var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '">' : (CAT_ICONS[p.category] || '📦');
    var qtyText = p.quantity < 1 ? '❌ Out' : p.quantity + ' left';
    return '<div class="prod-row">' +
      '<div class="pr-img">' + imgHtml + '</div>' +
      '<div class="pr-info"><div class="pr-name">' + p.name + '</div>' +
      '<div class="pr-meta">' + p.category + ' · ' + (p.description||'No description') + '</div></div>' +
      '<span class="pr-badge ' + p.condition + '">' + p.condition + '</span>' +
      '<div class="pr-qty">' + qtyText + '</div>' +
      '<div class="pr-price">' + formatPrice(p.price) + '</div>' +
      '<div class="pr-actions">' +
      '<button class="edit-stock-btn" onclick="openSmodal(\'' + p.id + '\',' + p.quantity + ')">Stock</button>' +
      '<button class="del-btn" onclick="deleteProduct(\'' + p.id + '\')">Delete</button>' +
      '</div></div>';
  });
  wrap.innerHTML = '<div class="prod-list">' + rows.join('') + '</div>';
}

// ORDERS
function getOrders(){ return JSON.parse(localStorage.getItem('dabz_orders')||'[]') }
function saveOrders(o){ localStorage.setItem('dabz_orders', JSON.stringify(o)) }

function setOrderStatus(el){
  orderStatusFilter = el.dataset.s;
  document.querySelectorAll('.sf-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function markOrder(code, status){
  const orders = getOrders();
  const o = orders.find(x=>x.code===code);
  if(o) o.status = status;
  saveOrders(orders);
  renderOrderStats();
  renderOrders();
}

function deleteOrder(code){
  if(!confirm('Delete this order?')) return;
  saveOrders(getOrders().filter(o=>o.code!==code));
  renderOrderStats();
  renderOrders();
}

function renderOrderStats(){
  const orders = getOrders();
  const pending = orders.filter(o=>o.status==='pending').length;
  const processed = orders.filter(o=>o.status==='processed').length;
  const total = orders.reduce((s,o)=>s+(o.status==='processed'?o.total:0),0);
  document.getElementById('orderStatsRow').innerHTML = `
    <div class="stat-card"><div class="stat-n">${orders.length}</div><div class="stat-l">Total Orders</div></div>
    <div class="stat-card"><div class="stat-n">${pending}</div><div class="stat-l">Pending</div></div>
    <div class="stat-card"><div class="stat-n">${processed}</div><div class="stat-l">Processed</div></div>
    <div class="stat-card"><div class="stat-n">${formatPrice(total)}</div><div class="stat-l">Revenue (Processed)</div></div>`;
}

function renderOrders(){
  var searchEl = document.getElementById('orderSearch');
  var q = searchEl ? searchEl.value.toLowerCase() : '';
  var orders = getOrders().filter(function(o){
    var matchStatus = orderStatusFilter==='all' || o.status===orderStatusFilter;
    var matchQ = !q || o.code.toLowerCase().includes(q) || o.name.toLowerCase().includes(q) || o.phone.includes(q);
    return matchStatus && matchQ;
  });
  var wrap = document.getElementById('ordersList');
  if(!orders.length){
    wrap.innerHTML = '<div class="orders-empty">No orders found' + (q ? ' for "'+q+'"' : '') + '.</div>';
    return;
  }
  var cards = orders.map(function(o){
    var date = new Date(o.createdAt).toLocaleString('en-NG',{dateStyle:'medium',timeStyle:'short'});
    var itemsText = o.items.map(function(i){ return i.name + ' (' + i.condition + ') x' + i.qty; }).join(', ');
    var actionBtn = o.status==='pending'
      ? '<button class="mark-btn" onclick="markOrder(\'' + o.code + '\',\'processed\')">Mark Processed</button>'
      : '<button class="unmark-btn" onclick="markOrder(\'' + o.code + '\',\'pending\')">Unmark</button>';
    return '<div class="order-card">' +
      '<div class="oc-head"><span class="oc-code">' + o.code + '</span><span class="oc-date">' + date + '</span></div>' +
      '<div class="oc-customer">Customer: <strong>' + o.name + '</strong> · <strong>' + o.phone + '</strong></div>' +
      '<div class="oc-items">' + itemsText + '</div>' +
      '<div class="oc-footer">' +
      '<span class="oc-total">' + formatPrice(o.total) + '</span>' +
      '<div class="oc-actions">' +
      '<span class="status-badge ' + o.status + '">' + o.status + '</span>' +
      actionBtn +
      '<button class="del-order-btn" onclick="deleteOrder(\'' + o.code + '\')">✕</button>' +
      '</div></div></div>';
  });
  wrap.innerHTML = cards.join('');
}
</script>
